<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>기사 · 게시판</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ css_v }}">
</head>
<body>
  <header class="mtop"><div class="mtop-inner">
    <a class="logo" href="/">게시판</a>
    <nav><a href="/">피드</a><a href="/discovery">둘러보기</a><a href="/media">미디어</a></nav>
  </div></header>
  <main class="mwrap"><article class="mcard adtl" id="detail">불러오는 중…</article></main>
  <script>window.__aid = {{ article_id }};</script>
  <script src="{{ url_for('static', filename='js/media-api.js') }}?v={{ css_v }}"></script>
  <script>
  (() => {
    const $ = (id) => document.getElementById(id); const aid = window.__aid;
    async function load() {
      try {
        const { article: a } = await API.call(`/api/articles/${aid}`);
        const s = a.stats || {};
        $("detail").innerHTML =
          `${a.is_breaking ? '<span class="b-breaking">속보</span>' : ''}
           <h2>${esc(a.title)}</h2>
           ${a.subtitle ? `<div class="sub">${esc(a.subtitle)}</div>` : ''}
           <div class="meta">${esc(a.org_name||'')} ${esc(a.author_name)} · ${esc(a.published_at||a.created_at)} · 조회 ${s.view_count||0}</div>
           ${a.cover_image_url ? `<img class="cover" src="${esc(a.cover_image_url)}">` : ''}
           ${a.summary ? `<p class="summary">${esc(a.summary)}</p>` : ''}
           <div class="body">${esc(a.body||'')}</div>
           ${a.source_url ? `<p class="muted">원문: <a href="${esc(a.source_url)}" target="_blank">${esc(a.source_url)}</a></p>` : ''}
           <div class="tags">${(a.tags||[]).map(t=>`<span class="tag">#${esc(t)}</span>`).join(' ')}</div>
           <div class="acts">
             <button id="like" class="act">♥ 좋아요 <b id="lc">${s.like_count||0}</b></button>
             <button id="share" class="act">공유 <b id="sc">${s.share_count||0}</b></button>
             <button id="report" class="act">신고</button>
             ${a.channel_id ? `<a class="act" href="/channel/${a.channel_id}">채널로</a>` : ''}
           </div>`;
        $("like").onclick = like; $("share").onclick = share; $("report").onclick = report;
      } catch (e) { $("detail").textContent = e.message; }
    }
    async function like() { try { const r = await API.call(`/api/articles/${aid}/like`, "POST");
      $("lc").textContent = r.like_count; $("like").classList.toggle("liked", r.liked); } catch(e){ needLogin(e)||toast(e.message,"error"); } }
    async function share() { try { await API.call(`/api/articles/${aid}/share`, "POST"); $("sc").textContent = (+$("sc").textContent)+1;
      navigator.clipboard?.writeText(location.href); toast("링크 복사됨", "ok"); } catch(e){ toast(e.message,"error"); } }
    async function report() { const reason = prompt("신고 사유 (fake_news, copyright 등)","fake_news"); if(!reason) return;
      try { await API.call(`/api/articles/${aid}/report`, "POST", {reason}); toast("신고 접수","ok"); } catch(e){ needLogin(e)||toast(e.message,"error"); } }
    document.addEventListener("DOMContentLoaded", load);
  })();
  </script>
</body>
</html>
