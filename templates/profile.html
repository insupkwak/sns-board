{% extends "base.html" %}
{% block title %}프로필{% endblock %}
{% block body_class %}page-body{% endblock %}
{% block body %}
<div class="page-wrap">
    <header class="page-header">
        <a href="/chat" class="icon-btn">←</a>
        <h1>프로필</h1>
    </header>

    <div class="card profile-card">
        <div class="profile-image-area">
            <div class="avatar lg" id="profileAvatar"></div>
            <form id="imageForm">
                <input type="file" id="profileImageInput" accept="image/*" hidden>
                <button type="button" class="btn-soft" id="changeImageBtn">이미지 변경</button>
            </form>
        </div>

        <form id="profileForm" class="profile-form">
            <label>로그인 아이디</label>
            <input type="text" id="profileUserId" disabled>

            <label>이름</label>
            <input type="text" id="profileUsername" maxlength="30" required>

            <label>상태 메시지</label>
            <input type="text" id="profileStatus" maxlength="100" placeholder="예: Available">

            <button type="submit" class="btn-primary">저장</button>
        </form>
        <p id="profileMsg" class="form-msg"></p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/profile.js') }}"></script>
{% endblock %}
