<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SNS Board</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ css_v }}">
</head>
<body>
    <div class="app-shell">

        <!-- 왼쪽 메뉴 -->
        <aside class="left-rail">
            <a href="#" class="logo" data-view="home"><span class="logo-mark"></span><span>SNS <strong>Board</strong></span></a>
            <nav class="nav-list">
                <button class="nav-item active" data-view="home"><span class="nav-ico">🏠</span> 홈</button>
                <button class="nav-item" data-view="explore"><span class="nav-ico">🧭</span> 탐색</button>
                <button class="nav-item" data-view="trends"><span class="nav-ico">🔥</span> 트렌드</button>
                <button class="nav-item" data-view="boards"><span class="nav-ico">🗂</span> 게시판</button>
                <button class="nav-item" data-view="notifications"><span class="nav-ico">🔔</span> 알림</button>
                <button class="nav-item" data-view="profile"><span class="nav-ico">👤</span> 내 정보</button>
            </nav>
            <div class="nav-divider"></div>
            <nav class="nav-list nav-secondary">
                <a class="nav-item" href="/discovery"><span class="nav-ico">📰</span> 미디어 둘러보기</a>
                <a class="nav-item" href="/media"><span class="nav-ico">✍</span> 미디어 운영</a>
                <a class="nav-item" href="/promotions"><span class="nav-ico">📣</span> 홍보</a>
                <a class="nav-item" href="/admin" id="adminLink" hidden><span class="nav-ico">⚙</span> 관리자</a>
            </nav>
            <button class="btn btn-primary nav-write-btn" id="leftWriteBtn">글쓰기</button>
            <div class="left-foot"><div class="auth-area" id="authArea"></div></div>
        </aside>

        <!-- 중앙 피드 -->
        <main class="feed">
            <section class="top-mobile-brand">
                <a href="#" class="logo" data-view="home"><span class="logo-mark"></span><span>SNS <strong>Board</strong></span></a>
                <button class="btn btn-secondary" id="mobileAuthBtn">로그인</button>
            </section>

            <header class="feed-header">
                <h1 class="feed-title" id="viewTitle">홈</h1>
                <p class="feed-subtitle" id="viewSubtitle">관심 있는 이야기와 최신 글을 확인하세요.</p>
            </header>

            <section class="mobile-search-wrap">
                <div class="search-box">
                    <span class="search-icon">⌕</span>
                    <input id="mobileSearchInput" type="search" placeholder="관심사, 게시판, 글 검색">
                </div>
            </section>

            <section class="chip-row" id="interestChips">
                <button class="chip active" data-category="all">전체</button>
                {% for c in categories %}
                <button class="chip" data-category="{{ c }}">{{ c }}</button>
                {% endfor %}
            </section>

            <section class="composer" id="composer" hidden>
                <div class="composer-main">
                    <div class="avatar avatar-small" id="composerAvatar"></div>
                    <textarea id="postContent" placeholder="무슨 이야기를 나누고 싶나요?"></textarea>
                </div>
                <div class="composer-actions">
                    <div class="composer-tools">
                        <span class="tool-hint" id="composerCategory">#전체</span>
                    </div>
                    <button class="btn btn-primary" id="submitPostBtn">게시하기</button>
                </div>
            </section>

            <p class="login-hint" id="loginHint" hidden>글을 작성하려면 로그인하세요.</p>

            <section id="viewContainer">
                <div id="postList" class="post-list"></div>
                <div id="feedLoader" class="feed-loader" hidden>불러오는 중…</div>
                <div id="emptyState" class="empty-state" hidden></div>
            </section>
        </main>

        <!-- 오른쪽 패널 -->
        <aside class="right-rail">
            <div class="search-box right-search">
                <span class="search-icon">⌕</span>
                <input id="rightSearchInput" type="search" placeholder="검색">
            </div>
            <section class="side-card">
                <h2 class="side-card-title">지금 뜨는 주제</h2>
                <div id="trendList" class="trend-list"></div>
            </section>
            <section class="side-card">
                <h2 class="side-card-title">추천 게시판</h2>
                <div id="recommendedBoards" class="recommended-boards"></div>
            </section>
            <section class="side-card">
                <h2 class="side-card-title">인기 태그</h2>
                <div id="popularTags" class="tag-cloud"></div>
            </section>
        </aside>
    </div>

    <!-- 모바일 하단 탭 -->
    <nav class="mobile-tabbar">
        <button class="tab-item active" data-view="home"><span class="ti-ico">🏠</span>홈</button>
        <button class="tab-item" data-view="explore"><span class="ti-ico">🧭</span>탐색</button>
        <button class="tab-item tab-create" data-action="write">＋</button>
        <button class="tab-item" data-view="trends"><span class="ti-ico">🔥</span>트렌드</button>
        <button class="tab-item" data-view="profile"><span class="ti-ico">👤</span>내정보</button>
    </nav>

    <!-- 로그인 / 회원가입 모달 -->
    <div id="authModal" class="modal-backdrop" hidden>
        <div class="modal-card">
            <div class="modal-head">
                <div class="tabs">
                    <button type="button" id="tabLogin" class="tab active">로그인</button>
                    <button type="button" id="tabRegister" class="tab">회원가입</button>
                </div>
            </div>
            <div class="modal-body">
                <form id="loginForm" class="auth-form">
                    <input class="form-input" type="email" name="email" placeholder="이메일" required>
                    <input class="form-input" type="password" name="password" placeholder="비밀번호" required>
                    <button type="submit" class="btn btn-primary btn-block">로그인</button>
                </form>
                <form id="registerForm" class="auth-form" hidden>
                    <input class="form-input" type="text" name="nickname" placeholder="별명" maxlength="20" required>
                    <input class="form-input" type="email" name="email" placeholder="이메일 주소" required>
                    <input class="form-input" type="password" name="password" placeholder="비밀번호 (4자 이상)" required>
                    <input class="form-input" type="password" name="password2" placeholder="비밀번호 확인" required>
                    <button type="submit" class="btn btn-primary btn-block">회원가입</button>
                </form>
                <p id="authError" class="auth-error"></p>
                <button type="button" id="authClose" class="modal-close">닫기</button>
            </div>
        </div>
    </div>

    <span class="version">v{{ version }}</span>
    <script src="{{ url_for('static', filename='js/app.js') }}?v={{ js_v }}"></script>
</body>
</html>
