{% extends "base.html" %}
{% block title %}둘러보기{% endblock %}
{% block body_class %}page-body{% endblock %}
{% block body %}
<div class="page-wrap wide">
  <header class="page-header">
    <a href="/chat" class="icon-btn">←</a>
    <h1>둘러보기</h1>
    <nav class="topnav">
      <a href="/discovery">둘러보기</a>
      <a href="/media">미디어</a>
      <a href="/promotions">홍보</a>
    </nav>
  </header>

  <div class="card">
    <div class="disc-search">
      <input type="text" id="discSearch" placeholder="채널 · 언론사 · 키워드 검색">
      <select id="discSort">
        <option value="relevance">관련도</option>
        <option value="popular">인기</option>
        <option value="new">최신</option>
        <option value="official">공식</option>
      </select>
    </div>
    <div class="cat-chips" id="catChips"></div>
  </div>

  <section id="promotedSection" class="card" hidden>
    <h2>🔹 추천 · 홍보</h2>
    <div id="promotedList" class="channel-grid"></div>
  </section>

  <section class="card">
    <h2 id="resultsTitle">채널</h2>
    <div id="resultsList" class="channel-grid"></div>
  </section>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/discovery.js') }}"></script>
{% endblock %}
