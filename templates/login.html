{% extends "base.html" %}
{% block title %}로그인{% endblock %}
{% block body_class %}auth-body{% endblock %}
{% block body %}
<div class="auth-card">
    <h1 class="auth-logo">Messenger</h1>
    <p class="auth-sub">텔레그램 스타일 내부 메신저</p>

    <form id="login-form" class="auth-form">
        <input type="text" name="user_id" placeholder="아이디" autocomplete="username" required>
        <input type="password" name="password" placeholder="비밀번호" autocomplete="current-password" required>
        <button type="submit" class="btn-primary">로그인</button>
    </form>
    <p id="auth-error" class="auth-error"></p>

    <p class="auth-switch">계정이 없나요? <a href="{{ url_for('register_page') }}">회원가입</a></p>
</div>

<script>
document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const f = e.target;
    const errEl = document.getElementById("auth-error");
    errEl.textContent = "";
    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({user_id: f.user_id.value, password: f.password.value}),
        });
        const data = await res.json();
        if (data.ok) { location.href = data.redirect || "/chat"; }
        else { errEl.textContent = data.error || "로그인 실패"; }
    } catch (_) { errEl.textContent = "서버 오류가 발생했습니다."; }
});
</script>
{% endblock %}
