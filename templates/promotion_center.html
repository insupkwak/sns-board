<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>홍보 센터 · 게시판</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ css_v }}">
</head>
<body>
  <header class="mtop"><div class="mtop-inner">
    <a class="logo" href="/">게시판</a>
    <nav><a href="/">피드</a><a href="/discovery">둘러보기</a><a href="/media">미디어</a><a href="/promotions" class="active">홍보</a></nav>
  </div></header>
  <main class="mwrap">
    <div class="mcard">
      <h2>홍보 캠페인 만들기</h2>
      <form id="form" class="mform">
        <label>내 채널 *</label><select id="channel"></select>
        <label>홍보 제목 *</label><input type="text" id="title" required>
        <label>홍보 설명</label><input type="text" id="desc">
        <label>노출 위치</label>
        <select id="placement"><option value="search_top">검색 상단</option><option value="home_featured">홈 추천</option><option value="category_top">카테고리 상단</option></select>
        <div class="row-end"><button type="submit" class="mbtn">캠페인 생성</button></div>
      </form>
      <p id="msg" class="mmsg"></p>
    </div>
    <div class="mcard"><h2>내 홍보 캠페인</h2><div class="alist" id="list"></div></div>
  </main>
  <script src="{{ url_for('static', filename='js/media-api.js') }}?v={{ css_v }}"></script>
  <script src="{{ url_for('static', filename='js/promotion.js') }}?v={{ css_v }}"></script>
</body>
</html>
