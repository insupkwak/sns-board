{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block body_class %}auth-body{% endblock %}
{% block body %}
<div class="auth-card">
    <h1 class="auth-logo">회원가입</h1>
    <p class="auth-sub">계정을 만들어 대화를 시작하세요</p>

    <form id="register-form" class="auth-form">
        <input type="text" name="username" placeholder="이름 (표시 이름)" maxlength="30" required>
        <input type="text" name="user_id" placeholder="로그인 아이디" autocomplete="username" required>
        <input type="password" name="password" placeholder="비밀번호 (4자 이상)" required>
        <input type="password" name="password2" placeholder="비밀번호 확인" required>
        <button type="submit" class="btn-primary">회원가입</button>
    </form>
    <p id="auth-error" class="auth-error"></p>

    <p class="auth-switch">이미 계정이 있나요? <a href="{{ url_for('login_page') }}">로그인</a></p>
</div>

<script>
document.getElementById("register-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const f = e.target;
    const errEl = document.getElementById("auth-error");
    errEl.textContent = "";
    try {
        const res = await fetch("/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: f.username.value, user_id: f.user_id.value,
                password: f.password.value, password2: f.password2.value,
            }),
        });
        const data = await res.json();
        if (data.ok) { location.href = data.redirect || "/login"; }
        else { errEl.textContent = data.error || "회원가입 실패"; }
    } catch (_) { errEl.textContent = "서버 오류가 발생했습니다."; }
});
</script>
{% endblock %}
