<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>미디어 대시보드 · 게시판</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ css_v }}">
</head>
<body>
  <header class="mtop"><div class="mtop-inner">
    <a class="logo" href="/">게시판</a>
    <nav><a href="/">피드</a><a href="/discovery">둘러보기</a><a href="/media" class="active">미디어</a><a href="/promotions">홍보</a></nav>
  </div></header>
  <main class="mwrap">
    <div class="mcard">
      <h2>1. 조직(언론사/방송사/기업)</h2>
      <form id="orgForm" class="mform">
        <label>조직명 *</label><input type="text" id="orgName" required>
        <label>유형</label><select id="orgType">
          <option value="media">언론사</option><option value="broadcast">방송사</option>
          <option value="company">기업</option><option value="public_agency">공공기관</option></select>
        <label>소개</label><input type="text" id="orgDesc">
        <div class="row-end"><button type="submit" class="mbtn">조직 생성</button></div>
      </form>
      <div class="alist" id="orgList"></div>
    </div>
    <div class="mcard">
      <h2>2. 채널</h2>
      <form id="chForm" class="mform">
        <label>채널 이름 *</label><input type="text" id="chName" required>
        <label>유형</label><select id="chType">
          <option value="news_channel">뉴스 채널</option><option value="channel">공식 채널</option><option value="discussion">토론 채널</option></select>
        <label>소속 조직</label><select id="chOrg"></select>
        <label>카테고리</label><select id="chCat"></select>
        <label>소개</label><input type="text" id="chDesc">
        <div class="row-end"><button type="submit" class="mbtn">채널 생성</button></div>
      </form>
      <div class="alist" id="chList"></div>
    </div>
    <div class="mcard">
      <h2>3. 기사</h2>
      <a class="mbtn" href="/article/new">＋ 기사 작성</a>
      <div class="alist" id="artList" style="margin-top:12px"></div>
    </div>
  </main>
  <script src="{{ url_for('static', filename='js/media-api.js') }}?v={{ css_v }}"></script>
  <script src="{{ url_for('static', filename='js/media_dashboard.js') }}?v={{ css_v }}"></script>
</body>
</html>
